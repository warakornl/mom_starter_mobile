# 07b-reminder-weekly.yaml
# Flow: login → Calendar → add weekly reminder (byDay MO/WE/FR) → assert CalendarScreen returned
#
# COVERAGE:
#   Verifies the weekly frequency UI interaction:
#     - reminder-freq-weekly chip is tappable
#     - reminder-byday-mo, reminder-byday-we, reminder-byday-fr chips toggle to selected state
#     - reminder-interval-weeks field is visible when weekly is active
#     - Form saves without error and CalendarScreen re-appears
#   Full agenda spot-check (occurrence on a matching weekday) = manual only (TC-REM-07).
#
# WHY calendar-agenda-item IS NOT ASSERTED HERE:
#   Maestro cannot reliably scroll the iOS date picker wheel to a specific date.
#   This flow accepts the pre-populated default start date (today = 2026-07-02, Thursday/TH).
#   Since TH is not in byDay=[MO, WE, FR], no occurrence is projected for today's date.
#   The pendingCalendarFocusDate module focuses the calendar on the start date (Thursday),
#   so the agenda on that date correctly contains no occurrence for this reminder.
#   Asserting calendar-agenda-item here would be unreliable or require a test-specific
#   start date that Maestro cannot set via the spinner picker.
#   -> Manual spot-check: TC-REM-07 (selects 2026-07-06/Monday as start date by hand).
#
# testIDs confirmed in source (grep /src/calendar/ReminderFormScreen.tsx):
#   reminder-freq-weekly   → testID={`reminder-freq-${f}`} where f='weekly'
#   reminder-byday-mo      → testID={`reminder-byday-${tok.toLowerCase()}`} where tok='MO'
#   reminder-byday-we      → tok='WE'
#   reminder-byday-fr      → tok='FR'
#   reminder-interval-weeks→ testID="reminder-interval-weeks" (shown only when freq=weekly)
#
# Prerequisites:
#   - iOS Simulator running with dev build (npx expo run:ios)
#   - Backend running at localhost:8080
#   - Account: dev@momstarter.local / DevTest-Password-2026 — auto-seeded and email-verified
#     ONLY when the backend runs with the local Spring profile (momstarter.dev.auto-verify-email=true).
#   - Account has a pregnancy profile (run 03-pregnancy.yaml first if needed)

appId: com.momstarter.app

---

- launchApp:
    clearState: true

# Login
- assertVisible:
    id: welcome-login-btn
- tapOn:
    id: welcome-login-btn

- tapOn:
    id: login-email
- clearText
- inputText: dev@momstarter.local

- tapOn:
    id: login-password
- clearText
- inputText: "DevTest-Password-2026"

- tapOn:
    id: login-submit

- extendedWaitUntil:
    visible:
      id: home-week-hero
    timeout: 10000

# Navigate to Calendar
- tapOn:
    id: home-calendar-shortcut

- extendedWaitUntil:
    visible:
      id: calendar-screen
    timeout: 8000

# Open ReminderForm
- tapOn:
    id: calendar-add-reminder-btn

- extendedWaitUntil:
    visible:
      id: reminder-startdate
    timeout: 5000

# Enter reminder title
- tapOn:
    id: reminder-title
- clearText
- inputText: "ทานวิตามิน Weekly E2E"

# Tap the "weekly" frequency chip (label: "เลือกวันในสัปดาห์" in Thai UI)
- tapOn:
    id: reminder-freq-weekly

# Verify 7-day selector appeared — reminder-byday-mo is the first chip in WEEKDAY_TOKENS
- assertVisible:
    id: reminder-byday-mo

# Verify interval-weeks field appeared (shown only when freq=weekly)
- assertVisible:
    id: reminder-interval-weeks

# Select days: MO (จ), WE (พ), FR (ศ)
- tapOn:
    id: reminder-byday-mo
- tapOn:
    id: reminder-byday-we
- tapOn:
    id: reminder-byday-fr

# Verify the other chips are still present (not hidden)
- assertVisible:
    id: reminder-byday-tu
- assertVisible:
    id: reminder-byday-th

# Open start-date picker — accept default (today)
- tapOn:
    id: reminder-startdate
- extendedWaitUntil:
    visible:
      id: reminder-picker-done
    timeout: 5000
- tapOn:
    id: reminder-picker-done

# Open start-time picker — accept default
- tapOn:
    id: reminder-starttime
- extendedWaitUntil:
    visible:
      id: reminder-picker-done
    timeout: 5000
- tapOn:
    id: reminder-picker-done

# Save
- tapOn:
    id: reminder-save

# CalendarScreen must re-appear (navigation.goBack() fired, no error)
- extendedWaitUntil:
    visible:
      id: calendar-screen
    timeout: 10000

# NOTE: calendar-agenda-item is NOT asserted here.
# Default start date = today (Thursday, 2026-07-02) does not match byDay=[MO,WE,FR].
# First occurrence will be Friday 2026-07-03; pendingCalendarFocusDate focuses Thursday.
# Agenda spot-check on a matching weekday must be done manually per TC-REM-07.
