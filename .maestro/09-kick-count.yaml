# 09-kick-count.yaml
# Flow: login → KickCountHome → start → tap 5× → undo → leave-guard-continue
#       → tap 5× → end session → assert summary screen.
#
# Prerequisites:
#   - iOS Simulator running with dev build (npx expo run:ios)
#   - Backend running at localhost:8080
#   - Account: dev@momstarter.local / DevTest-Password-2026 — auto-seeded and email-verified
#     ONLY when the backend runs with the local Spring profile (momstarter.dev.auto-verify-email=true).
#   - Account must have a PREGNANT profile at week >= 32 so that:
#     (a) home-kick-count-shortcut is rendered (shouldShowModule returns true)
#     (b) kick-start-btn is enabled on KickCountHome
#     Run flow 03-pregnancy.yaml first (sets week 38) or seed via API.
#   - generalHealthConsented is wired as `true` in HomeScreen (carry-forward TODO);
#     this flow will fail at kick-start-btn if the consent gate is ever enforced.
#
# DRAFT RESUME NOTE:
#   clearState: true clears the iOS Keychain for com.momstarter.app, so any
#   existing kick-count draft is discarded before the flow starts. This means
#   kick-start-btn always navigates to a fresh KickCountCountingScreen (not the
#   draft-resume sheet). Draft-resume (kick-draft-resume-sheet) is covered by
#   TC-KIC-07 in the manual test plan (requires stopApp + launchApp without clearState).
#   A future flow (09b-kick-count-draft-resume.yaml) should use:
#     - stopApp
#     - launchApp (without clearState)
#   to exercise the SC-K2 draft-resume path.
#
# REGRESSION:
#   - Y-7 rapid-tap fix: tapping kick-tap-btn multiple times in sequence now counts
#     all of them (functional-updater ensures no stale-closure count drops).
#     The 5 + 5 = 10 total taps (minus 1 undo = 9) validate this on the summary.
#     REG-03 BLOCKING FIX: assertVisible text:"9" checks the NUMERIC count — a stale-closure
#     drop that reduces the count below 9 will make this assertion FAIL the flow.
#   - kick-end-session-btn (B1 / INV-K3) is always enabled — never disabled or
#     highlighted differently regardless of count reaching 10.
#
# Selector strategy: testID (id:) throughout — language-independent.

appId: com.momstarter.app

---

- launchApp:
    clearState: true

# Login
- assertVisible:
    id: welcome-login-btn
- tapOn:
    id: welcome-login-btn

- tapOn:
    id: login-email
- clearText
- inputText: dev@momstarter.local

- tapOn:
    id: login-password
- clearText
- inputText: "DevTest-Password-2026"

- tapOn:
    id: login-submit

# Wait for Home (pregnant mode — needed for wk32 gate)
- extendedWaitUntil:
    visible:
      id: home-week-hero
    timeout: 10000

# Tap the kick-count shortcut (visible only for pregnant wk>=32 or postpartum)
- tapOn:
    id: home-kick-count-shortcut

# Wait for KickCountHome in the "ready" state
- extendedWaitUntil:
    visible:
      id: kick-home-ready
    timeout: 8000

# Assert the safety strip is always present (K-5d / INV-K6)
- assertVisible:
    id: kick-safety-strip

# Tap "เริ่มนับ" — navigates to KickCountCounting (new draft since clearState cleared Keychain)
- tapOn:
    id: kick-start-btn

# Wait for the counting screen (not the draft-resume sheet — see NOTE above)
- extendedWaitUntil:
    visible:
      id: kick-counting-screen
    timeout: 8000

# --- Tap 5 times (REGRESSION: Y-7 rapid-tap fix — all 5 should be counted) ---
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn

# --- Undo once (−1): count goes from 5 → 4 ---
# kick-undo-btn is interactive at count>0; visual appearance identical to count=0 (K-5b)
- tapOn:
    id: kick-undo-btn

# --- Test leave guard: cancel with count > 0 triggers the modal ---
- tapOn:
    id: kick-cancel-btn

# Leave guard modal should appear (count = 4 > 0)
- extendedWaitUntil:
    visible:
      id: kick-leave-guard-modal
    timeout: 5000

# Tap "Continue" to dismiss guard and keep counting
- tapOn:
    id: kick-leave-guard-continue-btn

# Back on counting screen — assert it's still visible
- assertVisible:
    id: kick-counting-screen

# --- Tap 5 more times (count goes from 4 → 9) ---
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn
- tapOn:
    id: kick-tap-btn

# --- End session (B1 / INV-K3: always-on, always enabled, never highlighted) ---
- tapOn:
    id: kick-end-session-btn

# After finalize: draft cleared, session saved to kickCountSyncStore, push triggered,
# navigator goes to KickCountSummaryScreen.
- extendedWaitUntil:
    visible:
      id: kick-summary-screen
    timeout: 10000

# Assert summary stats box is visible
- assertVisible:
    id: kick-summary-stats

# Assert the count Text is visible (should display 9 — 10 taps − 1 undo)
- assertVisible:
    id: kick-summary-count

# REG-03 BLOCKING FIX: assert the NUMERIC count, not just element visibility.
# Tap sequence: tap 5 → undo 1 (count=4) → leave-guard-continue → tap 5 (count=9) → end session
# Expected count = 9. If stale-closure drops any tap → count < 9 → this assertion FAILS.
- assertVisible:
    text: "9"

# Tap "Done" on summary to return to KickCountHome
- tapOn:
    id: kick-summary-done-btn

- extendedWaitUntil:
    visible:
      id: kick-home-ready
    timeout: 8000
