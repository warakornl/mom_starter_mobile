# 12-capture-self-log-consent-gate.yaml
# Flow: Consent-gated capture — general_health declined → Save → consent nudge modal →
#       Grant → value persists.
#
# ON-DEVICE ARTIFACT — this file is authored by the qa-test agent for on-device
# execution only. The sandbox cannot run Maestro flows. Execute with:
#
#   maestro test .maestro/12-capture-self-log-consent-gate.yaml
#
# Prerequisites:
#   - iOS Simulator running with dev build (npx expo run:ios)
#   - Backend running at localhost:8080
#   - Account: mom@test.local / MomTest-Password-2026 (pregnancy profile)
#   - Account must have general_health consent DECLINED before this flow runs.
#     Decline it via: Settings → Manage consents → Health logging → Decline.
#   - PREREQUISITE: calendar-add-capture-btn testID must be wired in CalendarScreen
#     (see 11-capture-self-log-happy.yaml Prerequisites).
#
# What this flow verifies:
#   SD-5 fail-closed gate (self-log-behavior.md §B.4, §A.3, SD-5):
#     - When general_health is NOT granted, tapping Save triggers the consent nudge
#       modal (capture-consent-modal), NOT a silent fail.
#     - The entered value is HELD (not discarded) while the modal is shown.
#     - Tapping "Grant" (capture-consent-grant) inside the modal completes the save
#       using the originally-entered value (no re-entry required — spec §B.4).
#     - After grant+save: CaptureScreen closes, Calendar shown, value persisted.
#
# Spec refs:
#   self-log-behavior.md §B.4 (limited-mode gate + grant path),
#   §A.3 (server consent fail-closed), §C E13 (consent-gate edge case),
#   SD-5 (general_health is MOTHER-health SD-5 gate), AC-20 / INV-S3 (nudge
#   copy must never describe the value as "too high/low").
#
# Traceability: closes GAP-4b (Maestro — consent-gated flow) and
#   GAP-SD-5f (grant→addSelfLog wiring — logic verified by
#   selfLogChain.integration.test.ts; this E2E flow confirms the UI wiring).
#
# Selector strategy: id: (testID) everywhere; text: fallback for modal buttons.

appId: com.momstarter.app

---

# ── 1. Launch fresh ──────────────────────────────────────────────────────────
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: welcome-login-btn
    timeout: 8000

# ── 2. Login ─────────────────────────────────────────────────────────────────
- tapOn:
    id: welcome-login-btn

- tapOn:
    id: login-email
- clearText
- inputText: mom@test.local

- tapOn:
    id: login-password
- clearText
- inputText: "MomTest-Password-2026"

- tapOn:
    id: login-submit

- extendedWaitUntil:
    visible:
      id: home-week-hero
    timeout: 10000

# Note: At this point the account should have general_health consent DECLINED
# (as required by the prerequisite step). If not, go to:
#   Home → ☰ Settings → Manage consents → Health logging → Decline.

# ── 3. Navigate to Calendar → Capture (requires calendar-add-capture-btn) ────
- tapOn:
    id: home-calendar-shortcut

- extendedWaitUntil:
    visible:
      id: calendar-screen
    timeout: 5000

- tapOn:
    id: calendar-add-capture-btn

- extendedWaitUntil:
    visible:
      id: capture-type-control
    timeout: 5000

# ── 4. Select weight + enter value ───────────────────────────────────────────
- tapOn:
    id: capture-type-weight

- tapOn:
    id: capture-weight-input
- clearText
- inputText: "63.0"

# Echo line visible — value is held in form state
- assertVisible:
    id: capture-echo-line

# ── 5. Tap Save — consent NOT granted → consent nudge modal appears ───────────
- tapOn:
    id: capture-save-btn

# Consent nudge modal must appear (spec §B.4 SD-5 gate)
- extendedWaitUntil:
    visible:
      id: capture-consent-modal
    timeout: 5000

# The modal copy must NEVER describe the value as "too high/low/abnormal" (INV-S3).
# Manual assertion: verify modal text is a consent request, not a health verdict.
# Modal contains: Grant button (capture-consent-grant) and Not Now (capture-consent-not-now).
- assertVisible:
    id: capture-consent-grant
- assertVisible:
    id: capture-consent-not-now

# ── 6. Grant consent inside the modal ─────────────────────────────────────────
# Per spec §B.4: tapping Grant completes the save with the HELD entered value
# (no re-entry required). The consent is updated and the log is persisted.
- tapOn:
    id: capture-consent-grant

# ── 7. Modal dismisses + save completes → CaptureScreen closes ───────────────
# After grant, the pending save is executed with the held payload (63.0 kg).
# CaptureScreen should close and return to Calendar.
- extendedWaitUntil:
    visible:
      id: calendar-screen
    timeout: 10000

# ── 8. Verify value persisted ─────────────────────────────────────────────────
# Calendar visible = save completed without error.
# For full E2E verification: navigate to today's Day-Detail and assert weight
# row "63.0 กก." appears in the agenda.
# The selfLogChain.integration.test.ts unit test covers the logic chain;
# this Maestro flow covers the UI wiring.
- assertVisible:
    id: calendar-screen

# End of flow — consent-gated capture: gate → grant → persist verified on-device.
