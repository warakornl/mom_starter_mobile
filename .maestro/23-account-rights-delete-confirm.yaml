# 23-account-rights-delete-confirm.yaml
# Flow: Settings → Delete account → type-to-confirm floor → (biometric — DEVICE-ONLY) →
#       real DELETE /v1/account → (S1 navigation — DEVICE-ONLY).
#
# ON-DEVICE ARTIFACT — execute with:
#   maestro test .maestro/23-account-rights-delete-confirm.yaml
#
# IMPORTANT: This flow is DESTRUCTIVE. It permanently deletes the test account.
# Run it only against a disposable test account. Re-create the account before
# running other flows that require login.
#
# Prerequisites:
#   - iOS Simulator or Android Emulator with dev build
#   - Backend running at localhost:8080
#   - A FRESH disposable account (not mom@test.local if it is used by other flows).
#     Suggested: create a one-off account for this flow only.
#   - Device enrolled with biometric or passcode (to exercise the step-up branch).
#     For NONE-device testing (skip step-up) see the prerequisites note below.
#
# Prerequisites for NONE-device (skip step-up path):
#   If testing on a Simulator with no biometric/passcode enrolled (SecurityLevel.NONE),
#   the step-up is skipped and the flow proceeds directly to DELETE on confirm.
#   The biometric prompt (LG-2) is therefore not shown — the DEVICE-ONLY section
#   can be bypassed for the NONE path, making this flow fully runnable in Maestro
#   on a Simulator without biometric enrollment.
#
# What this flow verifies (AR-AC-09, 19, 21, US-25/26/27):
#   AR-AC-09: Row opens sheet; confirm button disabled until floor satisfied.
#   AR-AC-19: Nudge is visible; direct path to export shown (nudge tap exercised by flow 24).
#   AR-AC-21: Disclosure section visible (slot rendered; no hardcoded number).
#   AR-AC-20: Skipping the nudge and proceeding to delete is allowed (prompt not block).
#
# *** DEVICE-ONLY LAUNCH-GATES in this flow ***
#   LG-2 (real biometric prompt): authenticateAsync presents the OS biometric/passcode
#         prompt. Maestro CANNOT drive the native biometric UI. The flow marks this
#         step with a comment and waits for the outcome. A human must authenticate.
#   LG-8 (DELETE + S1 navigation): The real DELETE /v1/account call and performLogout
#         + navigation to WelcomeScreen require a live backend 202 response and mounted
#         navigator. Maestro can assert the WelcomeScreen testID appears after the
#         human completes the biometric step, but the biometric itself is manual.
#
# Selector strategy: id: (testID) where available.

appId: com.momstarter.app

---

# ── 1. Launch fresh ──────────────────────────────────────────────────────────
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: welcome-login-btn
    timeout: 8000

# ── 2. Login (use a DISPOSABLE test account — this flow deletes it) ───────────
- tapOn:
    id: welcome-login-btn

- tapOn:
    id: login-email
- clearText
- inputText: mom@test.local

- tapOn:
    id: login-password
- clearText
- inputText: "MomTest-Password-2026"

- tapOn:
    id: login-submit

- extendedWaitUntil:
    visible:
      id: home-week-hero
    timeout: 10000

# ── 3. Navigate to Settings ───────────────────────────────────────────────────
- tapOn:
    id: home-settings-btn

- extendedWaitUntil:
    visible:
      id: settings-screen
    timeout: 5000

# ── 4. Tap "Delete my account" row ──────────────────────────────────────────
# AR-AC-09: A single tap opens the confirm sheet — does NOT delete immediately.
- assertVisible:
    id: settings-delete-account-btn

- tapOn:
    id: settings-delete-account-btn

# ── 5. Confirm sheet appears ─────────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: delete-sheet-title
    timeout: 5000

# AR-AC-21: Disclosure section visible (slot rendered, no hardcoded retention number).
- assertVisible:
    id: delete-sheet-disclosure

# AR-AC-19: Export nudge visible (direct path to export).
- assertVisible:
    id: delete-sheet-nudge

# AR-AC-09 (floor): Confirm button must be DISABLED before typing.
# We assert the confirm input is visible and the button exists in the layout.
- assertVisible:
    id: delete-sheet-confirm-input
- assertVisible:
    id: delete-sheet-confirm-btn

# ── 6. Type-to-confirm floor (AR-AC-09, AR-AC-28) ────────────────────────────
# The confirm word for 'en' locale is "DELETE" (CONFIRM_WORDS['en']).
# Case-insensitive match, surrounding whitespace trimmed (§3.7 M-1).
# Note: if the app locale is 'th', type "ลบ" instead.
- tapOn:
    id: delete-sheet-confirm-input
- clearText
- inputText: "DELETE"

# Floor is now satisfied: confirm button enables.
# Maestro cannot directly assert accessibilityState.disabled=false,
# but we assert the button remains visible and proceed to tap it.
- assertVisible:
    id: delete-sheet-confirm-btn

# ── 7. AR-AC-20: Nudge is prompt-not-block — proceed without downloading ──────
# The confirm button is enabled despite no export being run from the nudge.
# This verifies the nudge does NOT gate the confirm button.

# ── 8. Tap confirm (launches step-up gate) ────────────────────────────────────
- tapOn:
    id: delete-sheet-confirm-btn

# ── 9. DEVICE-ONLY LAUNCH-GATE: Biometric / passcode prompt ──────────────────
# On enrolled devices (SecurityLevel != NONE), the OS biometric/passcode prompt
# appears now. Maestro CANNOT drive this native UI.
#
# HUMAN ACTION REQUIRED:
#   [ ] The FaceID / Touch ID / passcode prompt appears on-device.
#   [ ] Authenticate successfully (scan face/fingerprint or enter device passcode).
#   [ ] After successful authentication, the flow proceeds to DELETE_IN_FLIGHT.
#
# On NONE devices (no biometric or passcode enrolled): step-up is skipped;
# the DELETE fires immediately after the confirm tap — no human action needed.
#
# Wait for the spinner (DELETE_IN_FLIGHT) or for WelcomeScreen (very fast DELETE):
- extendedWaitUntil:
    visible:
      id: welcome-login-btn
    timeout: 30000

# ── 10. DEVICE-ONLY LAUNCH-GATE: S1 navigation after 202 ─────────────────────
# performLogout ran (tokens + all health stores cleared) → navigated to WelcomeScreen.
# WelcomeScreen visible = DELETE succeeded + teardown completed (AR-AC-15).
- assertVisible:
    id: welcome-login-btn

# HUMAN VERIFICATION REQUIRED (before Phase-1 ship):
#   [ ] The delete confirm sheet opened correctly.
#   [ ] The biometric prompt appeared (on enrolled device).
#   [ ] After authentication, the account was deleted (backend 202 confirmed).
#   [ ] The app navigated to WelcomeScreen without error.
#   [ ] The account cannot be logged in to again (session is terminated).
#   [ ] Other devices see session expired on next token use (within access-token window).

# End of flow — sheet, floor, nudge, confirm verified in Maestro;
# biometric + DELETE + S1 nav are DEVICE-ONLY launch-gates.
