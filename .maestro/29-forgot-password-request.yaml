# 29-forgot-password-request.yaml
# Flow: Login → tap "ลืมรหัสผ่าน?" → ForgotPasswordScreen → submit email
#       → assert the neutral non-enumerating confirmation.
#
# Coverage:
#   - SEC-INV-1: the confirmation screen is identical regardless of whether the
#     email has an account (non-enumerating 202).
#   - Spec §2.2 "confirmation" state: form replaced by confirmTitle + confirmBody.
#   - Spec §7.2: Login "ลืมรหัสผ่าน?" link navigates to ForgotPasswordScreen.
#
# Prerequisites:
#   - iOS Simulator running with dev build (npx expo run:ios).
#   - Backend running (slice/feat-forgot-password-backend or later) at localhost:8080.
#   - Dev account dev@momstarter.local / DevTest-Password-2026 must exist in DB.
#   - No special backend flag needed — forgot-password always returns 202.
#
# LAUNCH-GATES (document only — not tested here):
#   - The RESET half (ResetPasswordScreen with a live token) requires:
#       1. A dev build (not Expo Go) for deep-link cold-start via Expo Linking.
#       2. momstarter.dev.expose-reset-token=true in the local backend profile
#          so the dev sender logs the "DEV RESET LINK" to the console.
#       3. Manual step: copy the link from the console, open it on the simulator
#          (xcrun simctl openurl booted 'momstarter://reset-password?token=<TOKEN>')
#          then continue with ResetPasswordScreen.
#   - Real SES transactional email is not yet wired (LocalDevPasswordEmailSender
#     is the only way to obtain a token in UAT). Until SES ships, the full
#     email-delivery path is a dev-terminal-only flow.
#
# Selector strategy: testID (id:) where available; text: for elements without testID.

appId: com.momstarter.app

---

# ── Step 1: Launch from a clean state ─────────────────────────────────────────

- launchApp:
    clearState: true

# Wait for Welcome screen
- assertVisible:
    id: welcome-login-btn

# Tap "เข้าสู่ระบบ"
- tapOn:
    id: welcome-login-btn

# ── Step 2: Login screen — fill credentials ────────────────────────────────────

- tapOn:
    id: login-email
- clearText
- inputText: dev@momstarter.local

- tapOn:
    id: login-password
- clearText
- inputText: "DevTest-Password-2026"

# Submit login
- tapOn:
    id: login-submit

# Wait for Home to confirm login succeeded
- extendedWaitUntil:
    visible:
      id: home-week-hero
    timeout: 10000

# ── Step 3: Navigate back to Login to access the forgot-password link ──────────
# (The typical user journey is: open app → Login screen → "ลืมรหัสผ่าน?"
#  Without an existing session we can reach Login directly. Here we logout first.)

- tapOn:
    text: "ออกจากระบบ"
    optional: true

# Alternatively relaunch without state to get to Login directly
- launchApp:
    clearState: true

- assertVisible:
    id: welcome-login-btn

- tapOn:
    id: welcome-login-btn

# ── Step 4: Tap "ลืมรหัสผ่าน?" on LoginScreen ─────────────────────────────────

- assertVisible:
    text: "ลืมรหัสผ่าน?"

- tapOn:
    text: "ลืมรหัสผ่าน?"

# ── Step 5: ForgotPasswordScreen — assert idle state ──────────────────────────

- assertVisible:
    id: forgot-email

- assertVisible:
    id: forgot-submit

# ── Step 6: Enter email and submit ────────────────────────────────────────────

- tapOn:
    id: forgot-email
- clearText
- inputText: test@example.com

- tapOn:
    id: forgot-submit

# ── Step 7: Assert non-enumerating confirmation (SEC-INV-1) ───────────────────
# The server always returns 202 whether or not the email has an account.
# The UI MUST show the same neutral confirmation regardless.

- extendedWaitUntil:
    visible:
      text: "ตรวจกล่องอีเมลของคุณ"
    timeout: 8000

# confirmBody is shown identically for existent and non-existent email (SEC-INV-1)
- assertVisible:
    text: "เราได้ส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณแล้ว โปรดตรวจกล่องอีเมล (รวมถึงโฟลเดอร์สแปม)"

# The form (email input) must be gone in the confirmation state
- assertNotVisible:
    id: forgot-email

# "กลับไปหน้าเข้าสู่ระบบ" back-to-login affordance is present
- assertVisible:
    text: "กลับไปหน้าเข้าสู่ระบบ"

# ── End of automatable flow ───────────────────────────────────────────────────
# The ResetPasswordScreen half (entering a token from the email link) requires
# the manual/dev step described in LAUNCH-GATES above. It is NOT automated here
# because Expo Go cannot handle cold-start deep-link interception, and the token
# is only available from the backend dev console log.
